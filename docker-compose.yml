# Development services for Teriac.
# The existing MariaDB at 127.0.0.1:3306 on the host is NOT containerized — the
# api connects to it via host.docker.internal (resolved on macOS/Windows).
# Add MariaDB to this file later if you want a fully containerized DB.

services:
  redis:
    image: redis:7-alpine
    container_name: teriac-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: teriac-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: dev-master-key-change-me
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data

volumes:
  redis-data:
  meili-data:
